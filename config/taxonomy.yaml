# --------------------------------------------------------------------
# qol — quality-of-life weights applied by the QoL scorer.
# --------------------------------------------------------------------
qol:
  salary_floor:        180000  # roles below this get a hard QoL drop
  work_mode_remote:    25       # remote preferred for Alex
  work_mode_hybrid:    18
  work_mode_onsite:     5
  crunch_penalty:      20
  commute_distance_penalty_per_mile: 0.5
